<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GateApp</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  color:#1f1f1f;
}

.app{
  max-width:430px;
  min-height:100vh;
  margin:auto;
  background:#f7f7f7;
  padding:22px;
}

.hero{
  background:#1f1f1f;
  color:white;
  border-radius:0 0 38px 38px;
  padding:34px 24px 42px;
  margin:-22px -22px 24px;
  position:relative;
}

.logo{
  width:68px;
  height:68px;
  background:white;
  color:#1f1f1f;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
  margin-bottom:22px;
}

.hero h1{
  margin:0;
  font-size:38px;
  line-height:1.1;
}

.hero p{
  color:#cfcfcf;
  margin:10px 0 0;
}

.card{
  background:white;
  border-radius:28px;
  padding:22px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h2{
  margin:0 0 18px;
  font-size:25px;
}

h3{
  margin:18px 0 8px;
}

input{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-bottom:1px solid #ddd;
  background:#fafafa;
  font-size:16px;
  outline:none;
}

input:focus{
  border-bottom:2px solid #111;
}

button{
  width:100%;
  padding:15px;
  margin:10px 0 0;
  border:none;
  border-radius:14px;
  background:#1f1f1f;
  color:white;
  font-size:16px;
  font-weight:bold;
}

button.blue{background:#2563eb}
button.red{background:#ef4444}
button.gray{background:#666}

.hidden{display:none}

.ok{color:#16a34a;font-weight:bold}
.bad{color:#dc2626;font-weight:bold}
.small{font-size:13px;color:#777}

.userbar{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
}

.badge{
  background:#f1f1f1;
  padding:8px 12px;
  border-radius:999px;
  font-weight:bold;
}

.resultBox{
  margin-top:14px;
}

.resultItem{
  background:#f8f8f8;
  padding:14px;
  border-radius:18px;
  margin:10px 0;
  border:1px solid #eee;
}

.resultItem b{
  font-size:18px;
}

ul{
  padding:0;
  margin:0;
}

li{
  list-style:none;
  background:#f8f8f8;
  border-radius:18px;
  padding:14px;
  margin:10px 0;
  border:1px solid #eee;
}

hr{
  border:none;
  border-top:1px solid #eee;
  margin:18px 0;
}

.footerSpace{height:30px}
</style>
</head>

<body>
<div class="app">

<div class="hero">
  <div class="logo">🚗</div>
  <h1>GateApp</h1>
  <p>ניהול כניסות, רכבים ומורשים</p>
</div>

<div id="authBox" class="card">
  <h2>כניסה</h2>

  <input id="loginUser" placeholder="שם משתמש">
  <input id="loginPass" type="password" placeholder="סיסמה">
  <button onclick="login()">התחבר</button>

  <hr>

  <h3>יצירת משתמש</h3>
  <input id="regUser" placeholder="שם משתמש חדש">
  <input id="regPass" type="password" placeholder="סיסמה">
  <input id="adminCode" placeholder="קוד אדמין אם יש">
  <button class="blue" onclick="register()">צור משתמש</button>

  <p class="small">קוד אדמין הופך את המשתמש למנהל.</p>
  <p id="authMsg"></p>
</div>

<div id="appBox" class="hidden">

  <div class="card">
    <div class="userbar">
      <div>
        <div class="small">מחובר כ</div>
        <b id="currentUser"></b>
      </div>
      <div class="badge" id="currentRole"></div>
    </div>
    <button class="gray" onclick="logout()">התנתק</button>
  </div>

  <div class="card">
    <h2>חיפוש מהיר</h2>
    <input id="liveSearch" placeholder="הקלד שם / מספר רכב / מספר אישי / כרטיס">
    <div id="liveResults" class="resultBox"></div>
  </div>

  <div class="card">
    <h2>בדיקת כניסה</h2>
    <input id="checkName" placeholder="שם">
    <input id="checkPersonalId" placeholder="מספר אישי">
    <input id="checkPlate" placeholder="מספר רכב">
    <input id="checkCard" placeholder="מספר כרטיס / קוד">
    <button onclick="checkAccess()">בדוק כניסה</button>
    <p id="accessResult"></p>
  </div>

  <div id="adminPanel" class="card hidden">
    <h2>ניהול מורשים</h2>

    <input id="personName" placeholder="שם אדם">
    <input id="personPersonalId" placeholder="מספר אישי">
    <input id="personPlate" placeholder="מספר רכב מורשה">
    <input id="personCard" placeholder="מספר כרטיס מורשה">

    <button onclick="addPerson()">הוסף מורשה</button>

    <h3>רשימת מורשים</h3>
    <ul id="peopleList"></ul>
  </div>

  <div class="card">
    <h2>לוג כניסות</h2>
    <button class="red" onclick="clearLogs()">נקה לוג</button>
    <ul id="logsList"></ul>
  </div>

</div>

<div class="footerSpace"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxRC4OSHlZbC5hst82WyxwGtsllot5nsA",
  authDomain: "gate-app1.firebaseapp.com",
  projectId: "gate-app1",
  storageBucket: "gate-app1.firebasestorage.app",
  messagingSenderId: "456292609349",
  appId: "1:456292609349:web:abd270156df0d663c1a22c",
  measurementId: "G-WQE0VHW1KM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const dataRef = doc(db, "gateApp", "mainData");

const ADMIN_CODE = "1501";

let users = [];
let people = [];
let logs = [];
let activeUser = JSON.parse(localStorage.getItem("activeUser")) || null;

async function loadData(){
  const snap = await getDoc(dataRef);

  if(snap.exists()){
    const data = snap.data();
    users = data.users || [];
    people = data.people || [];
    logs = data.logs || [];
  } else {
    users = [{username:"admin", password:"admin", role:"admin"}];
    people = [{name:"אייל", personalId:"", plate:"1234567", card:"1111"}];
    logs = [];
    await save();
  }

  render();
}

async function save(){
  await setDoc(dataRef, {users, people, logs});
  localStorage.setItem("activeUser", JSON.stringify(activeUser));
}

function matchPerson(p,q){
  return (
    (p.name && p.name.includes(q)) ||
    (p.personalId && p.personalId.includes(q)) ||
    (p.plate && p.plate.includes(q)) ||
    (p.card && p.card.includes(q))
  );
}

function personHTML(p){
  return `
    <div class="resultItem">
      ✅ <b>${p.name}</b><br>
      מספר אישי: ${p.personalId || "-"}<br>
      רכב: ${p.plate || "-"}<br>
      כרטיס: ${p.card || "-"}
    </div>
  `;
}

function renderLiveSearch(){
  let q = liveSearch.value.trim();

  if(!q){
    liveResults.innerHTML = "<span class='small'>התחל להקליד כדי לראות תוצאות...</span>";
    return;
  }

  let found = people.filter(p => matchPerson(p,q));

  if(found.length === 0){
    liveResults.innerHTML = "<span class='bad'>לא נמצאו תוצאות</span>";
    return;
  }

  liveResults.innerHTML = found.map(personHTML).join("");
}

function render(){
  if(activeUser){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    currentUser.innerText = activeUser.username;
    currentRole.innerText = activeUser.role;

    if(activeUser.role === "admin"){
      adminPanel.classList.remove("hidden");
    } else {
      adminPanel.classList.add("hidden");
    }
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }

  peopleList.innerHTML = people.map((p,i)=>`
    <li>
      <b>${p.name}</b><br>
      מספר אישי: ${p.personalId || "-"}<br>
      רכב: ${p.plate || "-"}<br>
      כרטיס: ${p.card || "-"}<br>
      <button class="red" onclick="deletePerson(${i})">מחק</button>
    </li>
  `).join("");

  logsList.innerHTML = logs.slice().reverse().map(l=>`<li>${l}</li>`).join("");

  if(document.getElementById("liveSearch")){
    renderLiveSearch();
  }
}

window.register = async function(){
  let username = regUser.value.trim();
  let password = regPass.value.trim();
  let code = adminCode.value.trim();

  if(!username || !password){
    authMsg.innerHTML = "<span class='bad'>חסר שם משתמש או סיסמה</span>";
    return;
  }

  if(users.find(u=>u.username === username)){
    authMsg.innerHTML = "<span class='bad'>שם המשתמש כבר קיים</span>";
    return;
  }

  let role = code === ADMIN_CODE ? "admin" : "user";
  users.push({username,password,role});
  await save();

  authMsg.innerHTML = `<span class='ok'>משתמש נוצר בהצלחה כסוג: ${role}</span>`;
};

window.login = function(){
  let username = loginUser.value.trim();
  let password = loginPass.value.trim();

  let user = users.find(u=>u.username === username && u.password === password);

  if(!user){
    authMsg.innerHTML = "<span class='bad'>שם משתמש או סיסמה לא נכונים</span>";
    return;
  }

  activeUser = user;
  localStorage.setItem("activeUser", JSON.stringify(activeUser));
  render();
};

window.logout = function(){
  activeUser = null;
  localStorage.removeItem("activeUser");
  render();
};

window.addPerson = async function(){
  if(!activeUser || activeUser.role !== "admin") return;

  let name = personName.value.trim();
  let personalId = personPersonalId.value.trim();
  let plate = personPlate.value.trim();
  let card = personCard.value.trim();

  if(!name){
    alert("חייבים שם");
    return;
  }

  people.push({name, personalId, plate, card});
  await save();
  render();

  personName.value="";
  personPersonalId.value="";
  personPlate.value="";
  personCard.value="";
};

window.deletePerson = async function(i){
  if(!activeUser || activeUser.role !== "admin") return;
  people.splice(i,1);
  await save();
  render();
};

window.checkAccess = async function(){
  let name = checkName.value.trim();
  let personalId = checkPersonalId.value.trim();
  let plate = checkPlate.value.trim();
  let card = checkCard.value.trim();

  let found = people.find(p =>
    (name && p.name === name) ||
    (personalId && p.personalId === personalId) ||
    (plate && p.plate === plate) ||
    (card && p.card === card)
  );

  let time = new Date().toLocaleString("he-IL");

  if(found){
    accessResult.innerHTML = `<span class='ok'>✅ כניסה מאושרת: ${found.name}</span>`;
    logs.push(`${time} - כניסה מאושרת - ${found.name}`);
  } else {
    accessResult.innerHTML = "<span class='bad'>❌ כניסה נדחתה</span>";
    logs.push(`${time} - כניסה נדחתה`);
  }

  await save();
  render();
};

window.clearLogs = async function(){
  logs = [];
  await save();
  render();
};

document.addEventListener("input", function(e){
  if(e.target && e.target.id === "liveSearch"){
    renderLiveSearch();
  }
});

loadData();
</script>

</body>
</html>
