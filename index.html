<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GateApp</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;
  padding:20px;
  color:#111827;
}
.container{max-width:700px;margin:auto}
h1{text-align:center;font-size:42px;margin:25px 0}
.card{
  background:rgba(255,255,255,.95);
  padding:22px;
  margin-bottom:22px;
  border-radius:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h2{font-size:28px;margin-top:0}
input,button{
  width:100%;
  padding:15px;
  margin:8px 0;
  box-sizing:border-box;
  border-radius:14px;
  border:1px solid #d1d5db;
  font-size:17px;
}
input{background:#f9fafb}
button{
  background:#2563eb;
  color:white;
  border:none;
  font-weight:bold;
}
.green{background:#22c55e}
.red{background:#ef4444}
.gray{background:#6b7280}
.hidden{display:none}
.ok{color:#16a34a;font-weight:bold}
.bad{color:#dc2626;font-weight:bold}
ul{padding:0}
li{
  background:#f9fafb;
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  list-style:none;
  border:1px solid #e5e7eb;
}
.small{font-size:13px;color:#6b7280}
hr{border:none;border-top:1px solid #e5e7eb;margin:18px 0}
</style>
</head>

<body>
<div class="container">
<h1>🚗 GateApp</h1>

<div id="authBox" class="card">
<h2>כניסה / יצירת משתמש</h2>

<h3>התחברות</h3>
<input id="loginUser" placeholder="שם משתמש">
<input id="loginPass" type="password" placeholder="סיסמה">
<button onclick="login()">התחבר</button>

<hr>

<h3>יצירת משתמש</h3>
<input id="regUser" placeholder="שם משתמש חדש">
<input id="regPass" type="password" placeholder="סיסמה">
<input id="adminCode" placeholder="קוד אדמין אם יש">
<button onclick="register()">צור משתמש</button>

<p class="small">קוד אדמין יסופק רק למורשי גישה כ-admin.</p>
<p id="authMsg"></p>
</div>

<div id="appBox" class="hidden">

<div class="card">
<p>מחובר כ: <b id="currentUser"></b> | סוג: <b id="currentRole"></b></p>
<button class="gray" onclick="logout()">התנתק</button>
</div>

<div class="card">
<h2>חיפוש אדם</h2>
<input id="searchName" placeholder="חפש לפי שם / מספר אישי / מספר רכב / כרטיס">
<button onclick="searchPerson()">חפש</button>
<p id="searchResult"></p>
</div>

<div class="card">
<h2>בדיקת כניסה</h2>
<input id="checkName" placeholder="שם">
<input id="checkPersonalId" placeholder="מספר אישי">
<input id="checkPlate" placeholder="מספר רכב">
<input id="checkCard" placeholder="מספר כרטיס / קוד">
<button onclick="checkAccess()">בדוק כניסה</button>
<p id="accessResult"></p>
</div>

<div id="adminPanel" class="card hidden">
<h2>ניהול הרשאות - Admin</h2>

<input id="personName" placeholder="שם אדם">
<input id="personPersonalId" placeholder="מספר אישי">
<input id="personPlate" placeholder="מספר רכב מורשה">
<input id="personCard" placeholder="מספר כרטיס מורשה">

<button onclick="addPerson()">הוסף אדם / הרשאה</button>

<h3>רשימת מורשים</h3>
<ul id="peopleList"></ul>
</div>

<div class="card">
<h2>לוג כניסות</h2>
<button class="red" onclick="clearLogs()">נקה לוג</button>
<ul id="logsList"></ul>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxRC4OSHlZbC5hst82WyxwGtsllot5nsA",
  authDomain: "gate-app1.firebaseapp.com",
  projectId: "gate-app1",
  storageBucket: "gate-app1.firebasestorage.app",
  messagingSenderId: "456292609349",
  appId: "1:456292609349:web:abd270156df0d663c1a22c",
  measurementId: "G-WQE0VHW1KM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const dataRef = doc(db, "gateApp", "mainData");

const ADMIN_CODE = "1501";

let users = [];
let people = [];
let logs = [];
let activeUser = JSON.parse(localStorage.getItem("activeUser")) || null;

async function loadData(){
  const snap = await getDoc(dataRef);

  if(snap.exists()){
    const data = snap.data();
    users = data.users || [];
    people = data.people || [];
    logs = data.logs || [];
  } else {
    users = [{username:"admin", password:"admin", role:"admin"}];
    people = [{name:"אייל", personalId:"", plate:"1234567", card:"1111"}];
    logs = [];
    await save();
  }

  render();
}

async function save(){
  await setDoc(dataRef, {users, people, logs});
  localStorage.setItem("activeUser", JSON.stringify(activeUser));
}

function render(){
  if(activeUser){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    currentUser.innerText = activeUser.username;
    currentRole.innerText = activeUser.role;

    if(activeUser.role === "admin"){
      adminPanel.classList.remove("hidden");
    } else {
      adminPanel.classList.add("hidden");
    }
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }

  peopleList.innerHTML = people.map((p,i)=>`
    <li>
      <b>${p.name}</b><br>
      מספר אישי: ${p.personalId || "-"}<br>
      רכב: ${p.plate || "-"}<br>
      כרטיס: ${p.card || "-"}<br>
      <button class="red" onclick="deletePerson(${i})">מחק</button>
    </li>
  `).join("");

  logsList.innerHTML = logs.slice().reverse().map(l=>`<li>${l}</li>`).join("");
}

window.register = async function(){
  let username = regUser.value.trim();
  let password = regPass.value.trim();
  let code = adminCode.value.trim();

  if(!username || !password){
    authMsg.innerHTML = "<span class='bad'>חסר שם משתמש או סיסמה</span>";
    return;
  }

  if(users.find(u=>u.username === username)){
    authMsg.innerHTML = "<span class='bad'>שם המשתמש כבר קיים</span>";
    return;
  }

  let role = code === ADMIN_CODE ? "admin" : "user";
  users.push({username,password,role});
  await save();

  authMsg.innerHTML = `<span class='ok'>משתמש נוצר בהצלחה כסוג: ${role}</span>`;
};

window.login = function(){
  let username = loginUser.value.trim();
  let password = loginPass.value.trim();

  let user = users.find(u=>u.username === username && u.password === password);

  if(!user){
    authMsg.innerHTML = "<span class='bad'>שם משתמש או סיסמה לא נכונים</span>";
    return;
  }

  activeUser = user;
  localStorage.setItem("activeUser", JSON.stringify(activeUser));
  render();
};

window.logout = function(){
  activeUser = null;
  localStorage.removeItem("activeUser");
  render();
};

window.addPerson = async function(){
  if(!activeUser || activeUser.role !== "admin") return;

  let name = personName.value.trim();
  let personalId = personPersonalId.value.trim();
  let plate = personPlate.value.trim();
  let card = personCard.value.trim();

  if(!name){
    alert("חייבים שם");
    return;
  }

  people.push({name, personalId, plate, card});
  await save();
  render();

  personName.value="";
  personPersonalId.value="";
  personPlate.value="";
  personCard.value="";
};

window.deletePerson = async function(i){
  if(!activeUser || activeUser.role !== "admin") return;
  people.splice(i,1);
  await save();
  render();
};

window.searchPerson = function(){
  let q = searchName.value.trim();

  let found = people.filter(p =>
    (p.name && p.name.includes(q)) ||
    (p.personalId && p.personalId.includes(q)) ||
    (p.plate && p.plate.includes(q)) ||
    (p.card && p.card.includes(q))
  );

  if(!q || found.length === 0){
    searchResult.innerHTML = "<span class='bad'>לא נמצא אדם כזה</span>";
    return;
  }

  searchResult.innerHTML = found.map(p=>`
    <div>
      ✅ <b>${p.name}</b><br>
      מספר אישי: ${p.personalId || "-"}<br>
      רכב: ${p.plate || "-"}<br>
      כרטיס: ${p.card || "-"}
    </div>
  `).join("<hr>");
};

window.checkAccess = async function(){
  let name = checkName.value.trim();
  let personalId = checkPersonalId.value.trim();
  let plate = checkPlate.value.trim();
  let card = checkCard.value.trim();

  let found = people.find(p =>
    (name && p.name === name) ||
    (personalId && p.personalId === personalId) ||
    (plate && p.plate === plate) ||
    (card && p.card === card)
  );

  let time = new Date().toLocaleString("he-IL");

  if(found){
    accessResult.innerHTML = `<span class='ok'>✅ כניסה מאושרת: ${found.name}</span>`;
    logs.push(`${time} - כניסה מאושרת - ${found.name}`);
  } else {
    accessResult.innerHTML = "<span class='bad'>❌ כניסה נדחתה</span>";
    logs.push(`${time} - כניסה נדחתה`);
  }

  await save();
  render();
};

window.clearLogs = async function(){
  logs = [];
  await save();
  render();
};

loadData();
</script>

</body>
</html>
